# ── J — LLM / AI Integration ────────────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "J1"
must = "The model is glue at a named seam"
catch = "auditor"
mechanism = "talus-auditor: the LLM call site is a named, typed seam that gates no control flow and authorizes no action (J §2); an ambient model capability is a finding."

[[coverage]]
gate = "J2"
must = "All model input is untrusted"
catch = "auditor"
mechanism = "talus-auditor §25 + J §3: direct/indirect prompt-injection defense — external text reaching the model is treated as hostile."

[[coverage]]
gate = "J3"
must = "All model output is untrusted"
catch = "auditor"
mechanism = "talus-auditor §25 + J §4: model output is validated as data, never executed or obeyed unchecked."

[[coverage]]
gate = "J4"
must = "Least privilege for the model"
catch = "auditor"
mechanism = "talus-auditor: minimal tools/data/authority for the model; high-consequence actions stay behind a human and the deterministic core (J §5)."

[[coverage]]
gate = "J5"
must = "Assume the context leaks"
catch = "auditor"
mechanism = "talus-auditor §25 + J §6: no secrets in prompts, data minimization; secret-scan is a backstop over prompt-building code."

[[coverage]]
gate = "J6"
must = "Isolate the non-deterministic seam"
catch = "design"
mechanism = "talus-architect places the model behind a port (umbrella Principle 2); an eval harness (J §7) is the evaluation gate."

# ── K — User Documentation ──────────────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "K1"
must = "Ship the artifacts the tool's tier requires"
catch = "ci-gate"
mechanism = "a docs-presence check (the tier-required artifacts from K §8 exist) plus an internal link-check (no broken cross-links, so the four jobs stay findable); talus-herald confirms each job is actually served."

[[coverage]]
gate = "K2"
must = "Each artifact holds its depth band"
catch = "design"
mechanism = "talus-herald (author + review) holds each artifact to its depth band and anti-scope (K §4–§8): a README growing into the manual, or a tutorial padded with reference, is a herald finding."

[[coverage]]
gate = "K3"
must = "User docs hold the voice"
catch = "auditor"
mechanism = "talus-herald review-time voice judgment — banned tells, show-don't-claim, honest caveats (K §9) — the judgment a linter cannot make; the no-dash sub-rule is mechanically backstopped by a grep gate (grep -nE '[–—]| -- ')."

[[coverage]]
gate = "K4"
must = "Docs match behavior"
catch = "ci-gate"
mechanism = "doc code blocks execute where a runner is feasible (K §11); talus-herald flags docs-behavior drift in review when no runner covers it."

[[coverage]]
gate = "K5"
must = "The CLI `--help`/man surface derives"
catch = "ci-gate"
mechanism = "a --help/man ↔ RTFM parity check where the tool has a CLI (K §6, §11): the help surface derives from the one reference, so a divergence fails the check."

[[coverage]]
gate = "K6"
must = "Every fact has one home"
catch = "design"
mechanism = "talus-herald: each fact has one home, linked from the others (K §2, §10); copy-paste duplication across the doc set is a finding."

