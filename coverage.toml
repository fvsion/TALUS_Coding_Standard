# coverage.toml — source of truth for GATE_COVERAGE.md (the self-conformance gate-coverage audit).
#
# For every must-gate in DOCTRINE.md (the handles [A1]..[PY9], defined in doctrine.toml), this records the
# enforcement arm that actually catches a violation. It is what makes "enforced, not aspirational" honest:
# a gate with no catch is a gap, surfaced here, not hidden.
#
# GATE_COVERAGE.md is GENERATED from this file by scripts/gen-coverage.py — never edit it by hand. The
# generator cross-checks this file against doctrine.toml: every gate handle must have exactly one row, no row
# may reference a missing handle, and each row's `must` token must still be a substring of that gate's text
# (a drift guard — if a gate is reworded or reordered, the check fails loudly instead of silently mismapping).
#
# catch levels — a strength ladder, strongest first:
#   ci-gate  = a blocking automated gate: a gates.toml / run-gates.py tool, or a repo/project CI check
#              (strip-proprietary.sh, gen-doctrine.py, a commit-lint, a build job). A tool returns pass/fail.
#   auditor  = talus-auditor review-time judgment — a FAIL/WARN finding tied to a §, the check a linter cannot make.
#   design   = caught at design time by the pipeline: talus-architect (design + ADRs) / talus-cartographer
#              (the contract registry). These produce and validate artifacts before code exists.
#   phase    = the talus-phase skill + AI Coding Phase Guidelines process: the phase template, the stop-for-
#              review gate, the STATUS ledger.
#   advisory = a strong default with no named TALUS arm; caught only downstream (the adopting project's own
#              tooling/review) or by general judgment. Each advisory row carries an explicit justification.
#
# Each row: gate (handle) · must (drift-guard token, a leading substring of the gate text) · catch · mechanism.

version = "1.3"

# ── A — Coding Standard (umbrella) ──────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "A1"
must = "Determinism decides"
catch = "auditor"
mechanism = "talus-auditor: decomposable-decision and 'no LLM decides' judgment (cross-checks the J standard's seam rules); no linter can decide this."

[[coverage]]
gate = "A2"
must = "Dependencies point inward"
catch = "ci-gate"
mechanism = "import-linter (gates.toml `imports`, Python §23.3) fails a forbidden cross-layer import; talus-auditor confirms the domain is framework/I/O-free (§8)."

[[coverage]]
gate = "A3"
must = "Extend by addition"
catch = "auditor"
mechanism = "talus-auditor §9 (SOLID): flags a widening if/match ladder where a strategy/registry belongs."

[[coverage]]
gate = "A4"
must = "Everything a reasonable operator"
catch = "auditor"
mechanism = "talus-auditor §11: flags magic literals in business logic and scattered os.environ reads."

[[coverage]]
gate = "A5"
must = "Secure and OpSec by construction"
catch = "ci-gate"
mechanism = "secret-scan + dep-audit + injection lint (gates.toml); talus-auditor §25 for boundary validation, output encoding, and the authorization chokepoint."

[[coverage]]
gate = "A6"
must = "Cross-platform by default"
catch = "auditor"
mechanism = "talus-auditor §17.4/§17.5: declared platforms (classifiers + README), per-OS code behind one adapter, guarded POSIX-only imports; the project's CI OS matrix is the blocking check."

[[coverage]]
gate = "A7"
must = "One canonical toolchain"
catch = "ci-gate"
mechanism = "this is the gate set itself: scripts/run-gates.py over gates.toml; non-conforming code fails CI."

[[coverage]]
gate = "A8"
must = "Every non-trivial project carries"
catch = "auditor"
mechanism = "talus-auditor flags a missing Architecture/ suite or README tier (§24); talus-architect/scribe produce it at design time (C standard)."

# ── B — AI Coding Phase Guidelines ──────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "B1"
must = "Work in bounded phases"
catch = "phase"
mechanism = "talus-phase skill: the six-part phase template; an open-ended request fails the shape check before any code."

[[coverage]]
gate = "B2"
must = "Cardinal rule"
catch = "phase"
mechanism = "talus-phase skill + the stop-for-review gate (Phase Guidelines §3): the session stops at the boundary and yields."

[[coverage]]
gate = "B3"
must = "Size the phase to the model"
catch = "phase"
mechanism = "talus-phase skill step 2 (model-aware sizing, Phase Guidelines §4); the reviewer rejects a mis-sized phase at the stop."

[[coverage]]
gate = "B4"
must = "Verify with evidence"
catch = "phase"
mechanism = "talus-phase skill step 4: tests/run/green gates plus a diff-scoped talus-auditor pass at the boundary; the gate evidence line records a real run (run-gates.py)."

[[coverage]]
gate = "B5"
must = "Record every stop"
catch = "phase"
mechanism = "talus-phase skill step 5 updates the STATUS ledger; talus-chronicler maintains the journal so the build is resumable."

[[coverage]]
gate = "B6"
must = "Keep the directive durable"
catch = "ci-gate"
mechanism = "install.sh installs the per-turn reminder hook and the default-on git pre-commit gate (run-gates.py --fast); the pre-commit + CI gate is the context-independent enforcement layer (Phase Guidelines §7.4)."

# ── C — Documentation & Architecting ────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "C1"
must = "Design precedes code"
catch = "auditor"
mechanism = "talus-auditor flags missing design specs against C §3; talus-architect produces the design before build."

[[coverage]]
gate = "C2"
must = "Carry the mandatory minimum"
catch = "design"
mechanism = "talus-scribe authors the 00–08 Architecture/ baseline (C §4); talus-auditor flags its absence."

[[coverage]]
gate = "C3"
must = "Every material decision is an ADR"
catch = "design"
mechanism = "talus-architect authors ADRs (C §7); review flags an unexplained material decision with no ADR."

[[coverage]]
gate = "C4"
must = "Every cross-component contract"
catch = "design"
mechanism = "talus-cartographer owns the contract registry (C §9 / E §11) — a contract without a registered owner/version is flagged at design time."

[[coverage]]
gate = "C5"
