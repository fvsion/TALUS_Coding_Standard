mechanism = "talus-phase updates STATUS at each stop; talus-chronicler maintains the roadmap/journal (C §11)."

# ── D — Visual UX/UI ────────────────────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "D1"
must = "The domain emits semantic roles"
catch = "auditor"
mechanism = "talus-auditor §10/§18: the domain emits roles/view-models and the adapter renders; raw color/escape codes in the core are a finding."

[[coverage]]
gate = "D2"
must = "Severity color is reserved"
catch = "auditor"
mechanism = "talus-auditor §18 color discipline; a Visual-UX review confirms severity semantics (loud = important) hold."

[[coverage]]
gate = "D3"
must = "A fully plain rendering"
catch = "auditor"
mechanism = "talus-auditor §18: ANSI to a redirected file/pipe (color not gated on isatty / NO_COLOR) is a FAIL; the plain form is golden-file testable (§22.3)."

[[coverage]]
gate = "D4"
must = "Meet the accessibility floor"
catch = "advisory"
mechanism = "no language-agnostic automated gate today: the adopting project runs accessibility tooling (e.g. axe/pa11y) and a Visual-UX review verifies D §7. The sole advisory residual — strong default, flagged honestly."

# ── E — API & Data Contract ─────────────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "E1"
must = "The contract is the schema"
catch = "design"
mechanism = "talus-architect/cartographer: integration is against a registered schema; talus-auditor flags code that screen-scrapes a sibling's human output."

[[coverage]]
gate = "E2"
must = "Contract-first"
catch = "design"
mechanism = "talus-architect designs and reviews the contract before either side is built (E §2)."

[[coverage]]
gate = "E3"
must = "Evolve compatibly"
catch = "design"
mechanism = "talus-cartographer registers a breaking change (E §5); a schema-diff/compat check in the producer's CI is the recommended blocking gate."

[[coverage]]
gate = "E4"
must = "One contract, two consumers"
catch = "design"
mechanism = "talus-architect: the producer emits the same envelope standalone or integrated and never requires the rest of the system (E §6)."

[[coverage]]
gate = "E5"
must = "Every contract has a known producer"
catch = "design"
mechanism = "talus-cartographer's registry is exactly this invariant: no contract without a documented producer and consumers (E §11)."

[[coverage]]
gate = "E6"
must = "Validate every payload"
catch = "auditor"
mechanism = "talus-auditor §25: untrusted input validated at the boundary against its schema before it reaches the domain."

# ── F — Security & OpSec ────────────────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "F1"
must = "Secure by construction"
catch = "ci-gate"
mechanism = "injection lint (raw-string SQL / non-parameterized Cypher fails CI, §23.1); talus-auditor §25 for boundary validation, output encoding, the authorization chokepoint."

[[coverage]]
gate = "F2"
must = "Least privilege and defense in depth"
catch = "auditor"
mechanism = "talus-auditor §25 judgment: over-broad scope/permissions, a single load-bearing control, default-allow on error."

[[coverage]]
gate = "F3"
must = "Secrets never touch source"
catch = "ci-gate"
mechanism = "secret-scan (gitleaks, gates.toml) fails a credential-shaped string in source; talus-auditor §16 flags secrets routed through logs."

[[coverage]]
gate = "F4"
must = "Consequential actions are recorded"
catch = "auditor"
mechanism = "talus-auditor / talus-architect: a consequential action without an immutable, attributable audit record is a finding (F §6)."

[[coverage]]
gate = "F5"
must = "Where a tool acts in a sensitive"
catch = "auditor"
mechanism = "talus-auditor §25/§17: temp-artifact cleanup, on-disk residue, observable footprint for a tool in a sensitive environment (F §7)."

[[coverage]]
gate = "F6"
must = "Security gates run in CI"
catch = "ci-gate"
mechanism = "secret-scan + dep-audit + injection lint run by run-gates.py over gates.toml (F §10)."

# ── G — Observability & Reliability ─────────────────────────────────────────────────────────────────────
[[coverage]]
gate = "G1"
must = "Observable by construction"
catch = "design"
mechanism = "talus-architect sizes telemetry to tier (G §3); talus-auditor §16 checks the two-stream logging discipline in code."

[[coverage]]
gate = "G2"
must = "Reliability is designed up front"
catch = "design"
mechanism = "talus-architect: timeouts/retries/idempotency/degradation are design choices (G §7); the production-readiness review (G §11) is the gate."

[[coverage]]
gate = "G3"
must = "Define SLIs/SLOs"
catch = "design"
mechanism = "the production-readiness review (G §11) requires declared SLIs/SLOs measured against; no code linter checks this."

[[coverage]]
