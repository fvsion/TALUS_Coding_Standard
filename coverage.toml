catch = "phase"
mechanism = "one phase is one branch and one PR (Phase Guidelines / H §4); PR review rejects a giant drop."

[[coverage]]
gate = "H3"
must = "Conventional Commits"
catch = "ci-gate"
mechanism = "a commit-message lint (e.g. commitlint) in CI rejects a non-conforming commit (H §3)."

[[coverage]]
gate = "H4"
must = "SemVer plus a generated"
catch = "ci-gate"
mechanism = "the release tooling (tag-driven, changelog-from-history, deterministic build) is mechanical (H §5–§7)."

[[coverage]]
gate = "H5"
must = "Merge and release are blocked"
catch = "ci-gate"
mechanism = "the CI gate orchestration blocks merge and publish (H §8) — the same run-gates set plus the per-standard gates."

[[coverage]]
gate = "H6"
must = "The dual-use git posture"
catch = "ci-gate"
mechanism = "the public release is produced mechanically (produce-the-public-tree, never push the working repo); a leak/visibility scan over the produced tree is the gate (strip-proprietary.sh --check here, or the project's equivalent), keeping the journal, .claude/, and design-time artifacts (Architecture/, Research_and_Planning/) out of public (H §9)."

