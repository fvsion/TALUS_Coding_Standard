catch = "ci-gate"
mechanism = "the build-time exclusion of pro/ plus a leak scan over the community artifact (the same one-source-strip-the-overlay pattern as strip-proprietary.sh) verifies no pro code ships (I §5/§6)."

[[coverage]]
gate = "I4"
