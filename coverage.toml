[[coverage]]
gate = "H1"
must = "Trunk is always releasable"
catch = "ci-gate"
mechanism = "branch-protection + the merge-blocking gate set (H §8): nothing that breaks a gate reaches main."

[[coverage]]
gate = "H2"
